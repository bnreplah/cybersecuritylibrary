name: Curate on Issue Request

on:
  issues:
    types: [opened, labeled, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  curate:
    if: contains(github.event.issue.labels.*.name, 'resource-request')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout cybersecuritylibrary
        uses: actions/checkout@v4

      - name: Checkout autonomous-researcher
        uses: actions/checkout@v4
        with:
          repository: bnreplah/autonomous-researcher
          ref: ${{ vars.AUTONOMOUS_RESEARCHER_REF || 'main' }}
          path: _autonomous_researcher

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: _autonomous_researcher/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r _autonomous_researcher/requirements.txt

      - name: Acknowledge issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🔎 Resource Curator is on it. Pulling RSS context, asking the LLM, and verifying URLs. I'll open a PR (or report back) shortly."
            });

      - name: Parse issue body for category + topic
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          node -e "
            const body = process.env.ISSUE_BODY || '';
            const title = process.env.ISSUE_TITLE || '';
            const allowed = ['tools','research','events','training','threatIntel','rssNews','rssVendor','rssIndy','liveFeeds'];
            // Issue forms render as: '### Category\\n\\ntools' — capture after the header.
            const catMatch = body.match(/###\\s*Category\\s*\\n+\\s*([A-Za-z]+)/i);
            let category = catMatch ? catMatch[1].trim() : '';
            if (!allowed.includes(category)) {
              // Fallback: scan body and title for any allowed token.
              const txt = (title + '\\n' + body).toLowerCase();
              category = allowed.find(c => txt.includes(c.toLowerCase())) || 'tools';
            }
            const topicMatch = body.match(/###\\s*Topic[^\\n]*\\n+\\s*([^\\n]+)/i);
            const topic = (topicMatch ? topicMatch[1] : '').trim().replace(/^_+|_+$/g,'');
            const maxMatch = body.match(/###\\s*Max[^\\n]*\\n+\\s*(\\d+)/i);
            const max = maxMatch ? maxMatch[1] : '5';
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT,
              'category=' + category + '\\n' +
              'topic=' + topic + '\\n' +
              'max=' + max + '\\n'
            );
            console.log('parsed category=' + category + ' topic=' + topic + ' max=' + max);
          "

      - name: Export existing DB
        run: node scripts/extract_db.js RESOURCES_DB.js existing.json

      - name: Run resource_finder.discover
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RESOURCE_FINDER_MODEL: ${{ vars.RESOURCE_FINDER_MODEL || 'claude' }}
          RESOURCE_FINDER_CLAUDE_MODEL: ${{ vars.RESOURCE_FINDER_CLAUDE_MODEL || 'claude-haiku-4-5-20251001' }}
          RESOURCE_FINDER_GEMINI_MODEL: ${{ vars.RESOURCE_FINDER_GEMINI_MODEL || 'gemini-2.5-flash' }}
        working-directory: _autonomous_researcher
        run: |
          python -m resource_finder.discover \
            --existing-db "$GITHUB_WORKSPACE/existing.json" \
            --category "${{ steps.parse.outputs.category }}" \
            --max "${{ steps.parse.outputs.max }}" \
            --topic "${{ steps.parse.outputs.topic }}" \
            --out "$GITHUB_WORKSPACE/proposed.json"

      - name: Count eligible proposals
        id: count
        run: |
          n=$(node -e "
            const p = JSON.parse(require('fs').readFileSync('proposed.json','utf8'));
            const ok = p.proposals.filter(x =>
              x.verification && x.verification.reachable &&
              (!x.verification.missing_fields || x.verification.missing_fields.length === 0)
            );
            console.log(ok.length);
          ")
          echo "n=$n" >> $GITHUB_OUTPUT

      - name: Merge into RESOURCES_DB.js
        if: steps.count.outputs.n != '0'
        run: node scripts/merge_curated.js proposed.json

      - name: Open PR
        if: steps.count.outputs.n != '0'
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/curate-issue-${{ github.event.issue.number }}
          base: main
          delete-branch: true
          commit-message: "bot: curate ${{ steps.parse.outputs.category }} (issue #${{ github.event.issue.number }})"
          title: "Auto-curate (issue #${{ github.event.issue.number }}): ${{ steps.parse.outputs.category }}"
          body: |
            Closes #${{ github.event.issue.number }}

            **Category:** `${{ steps.parse.outputs.category }}`
            **Topic:** ${{ steps.parse.outputs.topic || '_(none)_' }}
            **Eligible proposals:** ${{ steps.count.outputs.n }}

            See `proposed.json` in the workflow artifacts for full
            verification details.
          labels: |
            auto-curated
            needs-review

      - name: Comment back on issue (success)
        if: success() && steps.count.outputs.n != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ steps.pr.outputs.pull-request-number || 0 }};
            const body = pr
              ? `✅ Opened PR #${pr} with ${{ steps.count.outputs.n }} proposed entries. Please review and merge.`
              : `⚠️ Generated proposals but PR step did not run — see workflow logs.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment back on issue (no eligible)
        if: success() && steps.count.outputs.n == '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "ℹ️ The curator returned no proposals that passed URL verification and schema checks. Try a different topic, a different category, or raise --max in your request. See the workflow logs / artifact `proposed.json` for what was attempted."
            });

      - name: Comment back on issue (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ Auto-curation run failed. Logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curator-output-issue-${{ github.event.issue.number }}
          path: |
            existing.json
            proposed.json
          retention-days: 14
